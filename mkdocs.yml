site_name: Hyperbase
site_description: A foundational library for Semantic Hypergraphs
site_url: https://hyperquest.ai/hyperbase
repo_url: https://github.com/hyperquest-hq/hyperbase
repo_name: hyperquest-ai/hyperbase

theme:
  name: material
  logo: assets/images/logo_hyperquest_small_nav.svg
  favicon: assets/images/favicon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Publications & Use Cases: pubs-cases.md
  - Tutorials:
    - Parsing a Sentence: tutorials/parsing-a-sentence.md
  - Manual:
    - Overview: manual/overview.md
    - Notation: manual/notation.md
    - Hyperedge Operations: manual/hyperedge-operations.md
    - Patterns: manual/patterns.md
    - Discovering Patterns: manual/discovering-patterns.md
    - Parsing: manual/parsing.md
  - Authors: authors.md

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hyperquest-ai/hyperbase

copyright: Copyright &copy; 2026 CNRS / Hyperquest
